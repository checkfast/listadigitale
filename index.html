<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <link rel="manifest" href="manifest.json">
  <title>CheckFast – Lista Digitale</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#2b384b;color:#fff;margin:0;padding:15px}
    h1{text-align:center;font-size:22px;margin-bottom:20px}
    .card{background:#1f2937;border-radius:10px;padding:15px;margin-bottom:15px}
    #searchBox{padding:12px;border-radius:8px;border:none;width:70%;margin:6px auto;display:block;font-size:18px}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:18px}
    th,td{padding:14px;border-bottom:1px solid #444}
    th{background:#374151;text-align:left}
    tr{cursor:pointer}
    tr:hover{background:#4b5563}
    tr.confirmed{background:#4CAF50!important;color:#fff}
    tr.selected{background:#2563eb!important;color:#fff}
    button{padding:12px 14px;border:none;border-radius:8px;cursor:pointer;margin:6px;font-size:16px}
    button.ok{background:#16a34a;color:#fff}
    .counter{margin-top:10px;font-size:20px;text-align:center}
    .hidden{display:none}
    .popupConfirm{position:fixed;top:15%;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:30px 40px;border-radius:12px;font-size:26px;font-weight:bold;display:none;z-index:99999;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,0.6);animation:pop .3s ease-out}
    @keyframes pop{from{transform:translateX(-50%) scale(.9);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
    .actionsBottom{text-align:center;margin-top:20px}
    .actionsBottom button{min-width:140px;margin:6px;font-size:15px;padding:6px 8px;border-radius:6px;color:#fff}
    #showListBtn{background:#2563eb}
    #reportBtn{background:#d97706}
    #registerNewBtn{background:#16a34a}
    .logoBox{width:100%;text-align:center;margin-bottom:15px}
    .logoImg{max-width:150px;height:auto;filter:brightness(1)}
  </style>
</head>

<body>
  <div class="logoBox">
    <img src="https://static.wixstatic.com/media/2080b2_091288fac9ef49fb875e82a42f827415~mv2.png" alt="Logo" class="logoImg">
  </div>

  <h1>LAVAZZA | TRIENNALE MILANO 5 GIUGNO</h1>

  <div class="card hidden" id="toolsCard">
    <input type="text" id="searchBox" placeholder="Cerca ospite…" autofocus>

    <div class="counter">
      <span id="countChecked">0</span> / <span id="countTotal">0</span>
    </div>

    <div class="actionsBottom" id="exportCard">
      <button id="showListBtn">Mostra/Nascondi</button>
      <button id="reportBtn">Report</button>
      <button id="registerNewBtn">Registra nuovo ospite</button>
    </div>
  </div>

  <div class="card hidden" id="tableCard">
    <table id="dataTable">
      <thead>
        <tr>
          <th>OSPITI</th>
          <th>AZIENDA</th>
          <th>NOTE</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card hidden" id="confirmCard">
    <button id="confirmBtn" class="ok" style="width:100%;">CONFERMA</button>
  </div>

  <div class="popupConfirm" id="popupConfirm">Ospite Accreditato</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwsAe7lZZY6CfWXitxybapI-mm66ot2gOH_DucpbtpKxEjUINgTAqFK1QUcArZGr5IG-g/exec";

let rawRows = [];
let selectedRow = null;
let selectedData = null;
let listVisible = false;
let selectedKey = null;

const searchBox = document.getElementById('searchBox');
const tbody = document.getElementById('tbody');
const toolsCard = document.getElementById('toolsCard');
const tableCard = document.getElementById('tableCard');
const confirmCard = document.getElementById('confirmCard');
const confirmBtn = document.getElementById('confirmBtn');
const countChecked = document.getElementById('countChecked');
const countTotal = document.getElementById('countTotal');
const popupConfirm = document.getElementById('popupConfirm');
const showListBtn = document.getElementById('showListBtn');
const reportBtn = document.getElementById('reportBtn');
const registerNewBtn = document.getElementById('registerNewBtn');

async function caricaLista(){
  try{
    let res = await fetch(sheetURL + "?action=list&nocache=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    let data = await res.json();

    console.log("DATI RICEVUTI DALLO SCRIPT:", data);

    rawRows = Array.isArray(data) ? data.map(r => ({
      nominativo: String(r.nominativo || r.Nominativo || ''),
      azienda: String(r.azienda || r.Azienda || ''),
      note: String(r.note || r.Note || ''),
      ingresso: String(r.ingresso || r.Ingresso || '')
    })) : [];

    renderTable();
    toolsCard.classList.remove('hidden');

  }catch(err){
    console.error("Errore caricamento:", err);
    alert("Errore caricamento lista: " + err.message);
  }
}

async function confermaOspite(dati){
  try{
    const qs = new URLSearchParams({
      action: "ingresso",
      nominativo: dati.nominativo,
      azienda: dati.azienda || ""
    });

    let res = await fetch(sheetURL + "?" + qs.toString() + "&nocache=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    let out = await res.json();

    if(!out.ok){
      throw new Error(out.error || "Conferma non riuscita");
    }

    return out;

  }catch(err){
    console.error("Errore conferma:", err);
    alert("Errore conferma ospite: " + err.message);
    return null;
  }
}

function renderTable(){
  tbody.innerHTML = '';

  const qRaw = searchBox.value || '';
  const q = qRaw.toLowerCase();
  const showAllBySpace = (qRaw === ' ');

  let rows = [];

  if(listVisible || showAllBySpace){
    rows = rawRows;
  } else if(q.trim().length > 0){
    rows = rawRows.filter(r => {
      return String(r.nominativo).toLowerCase().includes(q) ||
             String(r.azienda).toLowerCase().includes(q) ||
             String(r.note).toLowerCase().includes(q);
    });
  }

  if(rows.length > 0){
    tableCard.classList.remove('hidden');
  } else {
    tableCard.classList.add('hidden');
  }

  rows.forEach(r => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${r.nominativo || ''}</td>
      <td>${r.azienda || ''}</td>
      <td>${r.note || ''}</td>
    `;

    const giaConfermato = r.ingresso && String(r.ingresso).trim() !== "";

    if(giaConfermato){
      tr.classList.add('confirmed');
      tr.style.pointerEvents = 'none';
    }

    const key = (r.nominativo || '') + '|' + (r.azienda || '');

    tr.addEventListener('click', () => {
      if(giaConfermato) return;

      if(tr.classList.contains('selected')){
        tr.classList.remove('selected');
        selectedRow = null;
        selectedData = null;
        selectedKey = null;
        confirmCard.classList.add('hidden');
        return;
      }

      [...tbody.children].forEach(row => row.classList.remove('selected'));

      tr.classList.add('selected');
      selectedRow = tr;
      selectedData = r;
      selectedKey = key;
      confirmCard.classList.remove('hidden');
    });

    if(!giaConfermato && selectedKey === key){
      tr.classList.add('selected');
      selectedRow = tr;
      selectedData = r;
      confirmCard.classList.remove('hidden');
    }

    tbody.appendChild(tr);
  });

  let c = rawRows.filter(r => r.ingresso && String(r.ingresso).trim() !== "").length;

  countChecked.textContent = c;
  countTotal.textContent = rawRows.length;
}

searchBox.addEventListener('input', renderTable);

confirmBtn.addEventListener('click', async () => {
  if(!selectedData) return;

  const out = await confermaOspite(selectedData);

  if(!out || !out.ok) return;

  if(selectedRow){
    selectedRow.classList.remove('selected');
    selectedRow.classList.add('confirmed');
    selectedRow.style.pointerEvents = 'none';
  }

  selectedRow = null;
  selectedData = null;
  selectedKey = null;

  confirmCard.classList.add('hidden');
  listVisible = false;
  searchBox.value = "";

  popupConfirm.textContent = "Ospite Accreditato";
  popupConfirm.style.display = "block";

  await caricaLista();

  setTimeout(() => popupConfirm.style.display = "none", 2000);
});

showListBtn.addEventListener('click', () => {
  listVisible = !listVisible;

  if(listVisible){
    searchBox.value = "";
  }

  renderTable();
});

reportBtn.addEventListener('click', () => {
  const ws = XLSX.utils.json_to_sheet(rawRows);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb, 'report_completo.xlsx');
});

async function aggiungiNuovoOspiteDaSearch(){
  const nome = (searchBox.value || "").trim();

  if(!nome){
    alert("Scrivi prima nome e cognome dell'ospite nel campo di ricerca");
    searchBox.focus();
    return;
  }

  try{
    const qs = new URLSearchParams({
      action: "aggiungi",
      nominativo: nome,
      azienda: "",
      note: ""
    });

    let res = await fetch(sheetURL + "?" + qs.toString() + "&nocache=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    let out = await res.json();

    if(!out.ok){
      throw new Error(out.error || "Registrazione non riuscita");
    }

    popupConfirm.textContent = "Nuovo ospite registrato";
    popupConfirm.style.display = "block";

    searchBox.value = "";
    listVisible = false;
    selectedRow = null;
    selectedData = null;
    selectedKey = null;
    confirmCard.classList.add('hidden');

    await caricaLista();

    setTimeout(() => popupConfirm.style.display = "none", 2000);

  }catch(err){
    popupConfirm.style.display = "none";
    console.error("Errore registrazione nuovo ospite:", err);
    alert("Errore registrazione nuovo ospite: " + err.message);
  }
}

registerNewBtn.addEventListener('click', async () => {
  registerNewBtn.disabled = true;

  const oldText = registerNewBtn.textContent;
  registerNewBtn.textContent = "Registrazione in corso...";

  try{
    await aggiungiNuovoOspiteDaSearch();
  }finally{
    registerNewBtn.disabled = false;
    registerNewBtn.textContent = oldText;
  }
});

caricaLista();
setInterval(caricaLista, 5000);
</script>

</body>
</html>
